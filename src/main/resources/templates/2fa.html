<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App - 2FA Verification</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .login-box {
            background: var(--background);
            padding: var(--spacing-xxl);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--background-dark);
        }
        
        .login-header {
            margin-bottom: var(--spacing-xl);
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            color: var(--text);
            font-weight: var(--font-weight-bold);
        }
        
        .login-header p {
            color: var(--text-light);
            font-size: 16px;
        }
        
        .login-form {
            text-align: left;
        }
        
        .submit-btn {
            width: 100%;
            font-size: 16px;
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        
        .form-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--background-dark);
            text-align: center;
        }
        
        .form-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .code-inputs-container {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            margin: var(--spacing-lg) 0;
        }
        
        .code-box-wrapper {
            position: relative;
            width: 50px;
            height: 60px;
            perspective: 500px;
        }
        
        .code-box {
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: var(--font-weight-bold);
            font-family: monospace;
            border: 2px solid var(--background-dark);
            border-radius: var(--border-radius);
            background: var(--background-light);
            color: transparent;
            caret-color: transparent;
            transition: border-color 0.2s ease;
            position: relative;
            z-index: 2;
        }
        
        .code-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .flip-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: var(--font-weight-bold);
            font-family: monospace;
            color: var(--text);
            pointer-events: none;
            z-index: 1;
        }
        
        .flip-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .flip-card.flipping .flip-card-inner {
            transform: rotateX(-180deg);
        }
        
        .flip-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--border-radius);
            background: var(--background-light);
        }
        
        .flip-card-front {
            transform: rotateX(0deg);
        }
        
        .flip-card-back {
            transform: rotateX(180deg);
        }
        
        .code-box::-webkit-outer-spin-button,
        .code-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .code-box[type=number] {
            -moz-appearance: textfield;
        }
        
        .submit-btn {
            width: 100%;
            font-size: 16px;
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            transition: all 0.3s ease;
        }
        
        .submit-btn.highlight {
            animation: pulse 0.5s ease-in-out;
            background: var(--accent);
            transform: scale(1.02);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .form-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--background-dark);
            text-align: center;
        }
        
        .form-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-md);
            }
            
            .login-box {
                padding: var(--spacing-lg);
            }
            
            .login-header h1 {
                font-size: 24px;
            }
            
            .code-inputs-container {
                gap: var(--spacing-sm);
            }
            
            .code-box-wrapper {
                width: 40px;
                height: 50px;
            }
            
            .code-box, .flip-card, .flip-card-face {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🔐 Two-Factor Authentication</h1>
                <p>Enter the 6-digit code from Google Authenticator</p>
            </div>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form method="POST" action="/2fa" class="login-form" id="twoFactorForm">
                <div class="form-group">
                    <label class="form-label">Authentication Code</label>
                    <div class="code-inputs-container">
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required autofocus data-index="0">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="1">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="2">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="3">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="4">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="5">
                            <div class="flip-card">
                                <div class="flip-card-inner">
                                    <div class="flip-card-face flip-card-front"></div>
                                    <div class="flip-card-face flip-card-back"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="code" name="code" required>
                </div>
                
                <button type="submit" class="btn btn-secondary submit-btn" id="submitBtn">Verify</button>
            </form>
            
            <div class="form-footer">
                <p><a href="/login">Back to login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('twoFactorForm');
            const boxes = document.querySelectorAll('.code-box');
            const flipCards = document.querySelectorAll('.flip-card');
            const hiddenInput = document.getElementById('code');
            const submitBtn = document.getElementById('submitBtn');
            
            // Track current displayed values
            const currentValues = Array(6).fill('');
            
            // Auto-focus first box
            boxes[0].focus();
            
            function flipDigit(index, newValue, isDelete = false) {
                const flipCard = flipCards[index];
                const flipInner = flipCard.querySelector('.flip-card-inner');
                const front = flipCard.querySelector('.flip-card-front');
                const back = flipCard.querySelector('.flip-card-back');
                const oldValue = currentValues[index];
                
                // Skip animation if value hasn't changed
                if (oldValue === newValue) {
                    return;
                }
                
                // Set up the flip
                front.textContent = oldValue || '';
                back.textContent = newValue || '';
                
                // Use different animation for delete
                if (isDelete) {
                    flipInner.style.transform = 'rotateX(180deg)';
                } else {
                    flipInner.style.transform = 'rotateX(-180deg)';
                }
                
                flipCard.classList.add('flipping');
                
                // After animation completes, reset for next flip
                setTimeout(() => {
                    // Update the displayed value
                    front.textContent = newValue || '';
                    back.textContent = '';
                    currentValues[index] = newValue;
                    
                    // Reset transform instantly
                    flipInner.style.transition = 'none';
                    flipInner.style.transform = 'rotateX(0deg)';
                    flipCard.classList.remove('flipping');
                    
                    // Re-enable transition
                    setTimeout(() => {
                        flipInner.style.transition = 'transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1)';
                    }, 50);
                }, 400);
            }
            
            function updateHiddenInput() {
                const code = Array.from(boxes).map(box => box.value).join('');
                hiddenInput.value = code;
                
                // Highlight submit button when all 6 digits are entered
                if (code.length === 6) {
                    submitBtn.classList.add('highlight');
                    submitBtn.focus();
                } else {
                    submitBtn.classList.remove('highlight');
                }
                
                return code;
            }
            
            boxes.forEach((box, index) => {
                // Handle input
                box.addEventListener('input', function(e) {
                    // Only allow single digit
                    if (this.value.length > 1) {
                        this.value = this.value.slice(0, 1);
                    }
                    
                    // Trigger flip animation
                    if (this.value || currentValues[index]) {
                        flipDigit(index, this.value, false);
                    }
                    
                    updateHiddenInput();
                    
                    // Move to next box if value entered
                    if (this.value && index < boxes.length - 1) {
                        boxes[index + 1].focus();
                    }
                });
                
                // Handle keydown for special keys
                box.addEventListener('keydown', function(e) {
                    // Backspace handling
                    if (e.key === 'Backspace') {
                        e.preventDefault(); // Prevent default to control behavior
                        
                        if (this.value) {
                            // If current box has value, clear it
                            flipDigit(index, '', true);
                            this.value = '';
                        } else if (index > 0) {
                            // If current box is empty, move to previous and clear it
                            boxes[index - 1].focus();
                            flipDigit(index - 1, '', true);
                            boxes[index - 1].value = '';
                        }
                        
                        updateHiddenInput();
                    }
                    
                    // Delete key - clear current box
                    if (e.key === 'Delete') {
                        e.preventDefault();
                        flipDigit(index, '', true);
                        this.value = '';
                        updateHiddenInput();
                    }
                    
                    // Left arrow - move to previous box
                    if (e.key === 'ArrowLeft' && index > 0) {
                        e.preventDefault();
                        boxes[index - 1].focus();
                    }
                    
                    // Right arrow - move to next box
                    if (e.key === 'ArrowRight' && index < boxes.length - 1) {
                        e.preventDefault();
                        boxes[index + 1].focus();
                    }
                    
                    // Enter - submit form if all digits entered
                    if (e.key === 'Enter') {
                        const code = updateHiddenInput();
                        if (code.length === 6) {
                            form.submit();
                        }
                    }
                    
                    // Prevent non-numeric input
                    if (e.key.length === 1 && !/[0-9]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Tab' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') {
                        e.preventDefault();
                    }
                });
                
                // Handle paste
                box.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    
                    pastedData.split('').forEach((digit, i) => {
                        if (index + i < boxes.length) {
                            boxes[index + i].value = digit;
                            flipDigit(index + i, digit, false);
                        }
                    });
                    
                    // Focus the next empty box or last box
                    const nextIndex = Math.min(index + pastedData.length, boxes.length - 1);
                    boxes[nextIndex].focus();
                    
                    updateHiddenInput();
                });
                
                // Select all on focus for easy replacement
                box.addEventListener('focus', function() {
                    this.select();
                });
            });
            
            // Handle backspace on submit button - go back to last box and clear it
            submitBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    boxes[5].focus();
                    flipDigit(5, '', true);
                    boxes[5].value = '';
                    updateHiddenInput();
                }
            });
            
            // Prevent form submission if code is incomplete
            form.addEventListener('submit', function(e) {
                const code = updateHiddenInput();
                if (code.length !== 6) {
                    e.preventDefault();
                    boxes[0].focus();
                }
            });
        });
    </script>
</body>
</html>
