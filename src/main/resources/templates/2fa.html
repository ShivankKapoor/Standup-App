<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App - 2FA Verification</title>
    <script>(function(){var t=localStorage.getItem('standup_theme');document.documentElement.setAttribute('data-theme',t||'light');})();</script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .login-box {
            background: var(--background);
            padding: var(--spacing-xxl);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--background-dark);
        }
        
        .login-header {
            margin-bottom: var(--spacing-xl);
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            color: var(--text);
            font-weight: var(--font-weight-bold);
        }
        
        .login-header p {
            color: var(--text-light);
            font-size: 16px;
        }
        
        .login-form {
            text-align: left;
        }
        
        .submit-btn {
            width: 100%;
            font-size: 16px;
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        
        .form-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--background-dark);
            text-align: center;
        }
        
        .form-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        .code-inputs-container {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            margin: var(--spacing-lg) 0;
        }
        
        .code-box-wrapper {
            position: relative;
            width: 50px;
            height: 60px;
        }
        
        .code-box {
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: var(--font-weight-bold);
            font-family: monospace;
            border: 2px solid var(--background-dark);
            border-radius: var(--border-radius);
            background: transparent;
            color: transparent;
            caret-color: transparent;
            transition: border-color 0.2s ease;
            position: relative;
            z-index: 2;
        }
        
        .code-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            animation: pulse-box 2s ease-in-out infinite;
        }
        
        @keyframes pulse-box {
            0%, 100% {
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.2), 0 0 20px rgba(59, 130, 246, 0.3);
            }
        }

        /* Odometer / fuel counter styles */
        .odometer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
            border-radius: var(--border-radius);
            background: var(--background-light);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
        }

        .odometer-strip {
            display: flex;
            flex-direction: column;
            transform: translateY(0);
            will-change: transform;
        }

        .odometer-digit {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: var(--font-weight-bold);
            font-family: monospace;
            color: var(--text);
            flex-shrink: 0;
        }
        
        .code-box::-webkit-outer-spin-button,
        .code-box::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .code-box[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        
        .submit-btn {
            width: 100%;
            font-size: 16px;
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
            transition: all 0.3s ease;
        }
        
        .submit-btn.highlight {
            animation: pulse 0.5s ease-in-out;
            background: var(--accent);
            transform: scale(1.02);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .form-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--background-dark);
            text-align: center;
        }
        
        .form-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .form-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-md);
            }
            
            .login-box {
                padding: var(--spacing-lg);
            }
            
            .login-header h1 {
                font-size: 24px;
            }
            
            .code-inputs-container {
                gap: var(--spacing-sm);
            }
            
            .code-box-wrapper {
                width: 40px;
                height: 50px;
            }
            
            .code-box, .odometer-digit {
                font-size: 24px;
            }

            .odometer-digit {
                height: 50px;
            }
        }

    </style>
</head>
<body>
    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()"></button>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🔐 Two-Factor Authentication</h1>
                <p>Enter the 6-digit code</p>
            </div>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form method="POST" action="/2fa" class="login-form" id="twoFactorForm">
                <div class="form-group">
                    <label class="form-label">Authentication Code</label>
                    <div class="code-inputs-container">
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required autofocus data-index="0">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="1">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="2">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="3">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="4">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                        <div class="code-box-wrapper">
                            <input type="number" class="code-box" maxlength="1" min="0" max="9" pattern="\d" inputmode="numeric" required data-index="5">
                            <div class="odometer"><div class="odometer-strip"><div class="odometer-digit"></div><div class="odometer-digit">0</div><div class="odometer-digit">1</div><div class="odometer-digit">2</div><div class="odometer-digit">3</div><div class="odometer-digit">4</div><div class="odometer-digit">5</div><div class="odometer-digit">6</div><div class="odometer-digit">7</div><div class="odometer-digit">8</div><div class="odometer-digit">9</div></div></div>
                        </div>
                    </div>
                    <input type="hidden" id="code" name="code" required>
                </div>
                
                <button type="submit" class="btn btn-secondary submit-btn" id="submitBtn">Verify</button>
            </form>
            
            <div class="form-footer">
                <p><a href="/login">Back to login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('twoFactorForm');
            const boxes = document.querySelectorAll('.code-box');
            const strips = document.querySelectorAll('.odometer-strip');
            const hiddenInput = document.getElementById('code');
            const submitBtn = document.getElementById('submitBtn');

            // Auto-focus first box
            boxes[0].focus();

            function spinDigit(index, newValue, isDelete = false) {
                const strip = strips[index];
                // Cell height matches .odometer-digit size (60px desktop, 50px mobile)
                const cellHeight = strip.querySelector('.odometer-digit').offsetHeight;

                if (newValue === '' || newValue === null) {
                    // Scroll back up to blank
                    strip.style.transition = 'transform 0.25s ease-in';
                    strip.style.transform = 'translateY(0)';
                } else {
                    const digit = parseInt(newValue);
                    // Instantly snap to blank (top of strip)
                    strip.style.transition = 'none';
                    strip.style.transform = 'translateY(0)';
                    // Force reflow before adding transition
                    strip.getBoundingClientRect();
                    // Duration scales with digit so it spins at constant speed
                    // 0 → 100ms, 9 → 568ms
                    const duration = 100 + (digit * 52);
                    // Animate down to the target digit
                    // Strip layout: blank=index 0, digit 0=index 1, digit N=index N+1
                    strip.style.transition = `transform ${duration}ms cubic-bezier(0.0, 0.0, 0.15, 1.0)`;
                    strip.style.transform = `translateY(-${(digit + 1) * cellHeight}px)`;
                }
            }
            
            function updateHiddenInput() {
                const code = Array.from(boxes).map(box => box.value).join('');
                hiddenInput.value = code;
                
                // Highlight submit button when all 6 digits are entered
                if (code.length === 6) {
                    submitBtn.classList.add('highlight');
                    submitBtn.focus();
                } else {
                    submitBtn.classList.remove('highlight');
                }
                
                return code;
            }
            
            boxes.forEach((box, index) => {
                // Handle input
                box.addEventListener('input', function(e) {
                    // Only allow single digit
                    if (this.value.length > 1) {
                        this.value = this.value.slice(0, 1);
                    }
                    
                    // Trigger odometer animation
                    spinDigit(index, this.value);
                    
                    updateHiddenInput();
                    
                    // Move to next box if value entered
                    if (this.value && index < boxes.length - 1) {
                        boxes[index + 1].focus();
                    }
                });
                
                // Handle keydown for special keys
                box.addEventListener('keydown', function(e) {
                    // Backspace handling
                    if (e.key === 'Backspace') {
                        e.preventDefault(); // Prevent default to control behavior
                        
                        if (this.value) {
                            // If current box has value, clear it
                            spinDigit(index, '', true);
                            this.value = '';
                        } else if (index > 0) {
                            // If current box is empty, move to previous and clear it
                            boxes[index - 1].focus();
                            spinDigit(index - 1, '', true);
                            boxes[index - 1].value = '';
                        }
                        
                        updateHiddenInput();
                    }
                    
                    // Delete key - clear current box
                    if (e.key === 'Delete') {
                        e.preventDefault();
                        spinDigit(index, '', true);
                        this.value = '';
                        updateHiddenInput();
                    }
                    
                    // Left arrow - move to previous box
                    if (e.key === 'ArrowLeft' && index > 0) {
                        e.preventDefault();
                        boxes[index - 1].focus();
                    }
                    
                    // Right arrow - move to next box
                    if (e.key === 'ArrowRight' && index < boxes.length - 1) {
                        e.preventDefault();
                        boxes[index + 1].focus();
                    }
                    
                    // Enter - submit form if all digits entered
                    if (e.key === 'Enter') {
                        const code = updateHiddenInput();
                        if (code.length === 6) {
                            form.submit();
                        }
                    }
                    
                    // Prevent non-numeric input
                    if (e.key.length === 1 && !/[0-9]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Tab' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') {
                        e.preventDefault();
                    }
                });
                
                // Handle paste
                box.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    
                    pastedData.split('').forEach((digit, i) => {
                        if (index + i < boxes.length) {
                            boxes[index + i].value = digit;
                            // Stagger spin animations for a cool cascade effect
                            setTimeout(() => spinDigit(index + i, digit), i * 80);
                        }
                    });
                    
                    // Focus the next empty box or last box
                    const nextIndex = Math.min(index + pastedData.length, boxes.length - 1);
                    boxes[nextIndex].focus();
                    
                    updateHiddenInput();
                });
                
                // Select all on focus for easy replacement
                box.addEventListener('focus', function() {
                    this.select();
                });
            });
            
            // Handle backspace on submit button - go back to last box and clear it
            submitBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    boxes[5].focus();
                    spinDigit(5, '', true);
                    boxes[5].value = '';
                    updateHiddenInput();
                }
            });
            
            // Prevent form submission if code is incomplete
            form.addEventListener('submit', function(e) {
                const code = updateHiddenInput();
                if (code.length !== 6) {
                    e.preventDefault();
                    boxes[0].focus();
                }
            });
        });
    </script>
</body>
</html>
