<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <title> Standup Entry</title>
    <script>(function(){var t=localStorage.getItem('standup_theme');document.documentElement.setAttribute('data-theme',t||'light');})();</script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/toast.js}"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
        }
        
        .session-timer {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.95);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }
        
        .session-timer img {
            width: 32px;
            height: 32px;
        }
        
        .session-timer-text {
            font-size: 16px;
            font-weight: var(--font-weight-semibold);
            font-family: var(--font-family-mono);
            color: var(--text);
        }
        
        .session-timer.warning {
            background: rgba(255, 193, 7, 0.95);
            animation: pulse 1s infinite;
        }
        
        .session-timer.warning .session-timer-text {
            color: var(--background);
        }
        
        .session-timer.critical {
            background: rgba(220, 53, 69, 0.95);
            animation: pulse 0.5s infinite;
        }
        
        .session-timer.critical .session-timer-text {
            color: var(--background);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-xl);
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-bold);
        }
        
        .content {
            padding: var(--spacing-xl);
        }
        
        .date-display {
            font-size: 24px;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }
        
        .entry-content {
            background: var(--background-dark);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            border: 1px solid var(--background-darker);
            margin-bottom: var(--spacing-lg);
            min-height: 200px;
            white-space: pre-wrap;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
        }
        
        .no-entry {
            color: var(--text-muted);
            font-style: italic;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0;
            text-align: center;
            width: 100%;
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            align-items: center;
        }
        
        .button-row-top {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .button-row-bottom {
            display: flex;
            justify-content: center;
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, var(--primary) 100%);
            color: var(--background);
        }

        [data-theme="dark"] .session-timer {
            background: rgba(26, 29, 46, 0.95);
        }

        @media (max-width: 768px) {
            body {
                padding: var(--spacing-md);
            }
            
            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }
            
            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .session-timer {
                bottom: var(--spacing-md);
                right: var(--spacing-md);
                padding: var(--spacing-xs) var(--spacing-sm);
            }
            
            .session-timer img {
                width: 24px;
                height: 24px;
            }
            
            .session-timer-text {
                font-size: 14px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </a>
    </div>

    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()"></button>

    <div class="session-timer" id="session-timer">
        <img th:src="@{/images/hourglass.apng}" alt="Timer">
        <span class="session-timer-text">15:00</span>
    </div>

    <div class="container">
        <div class="header">
            <h1><img th:src="@{/images/faviconPNG.png}" alt="Standup App" style="width:36px;height:36px;vertical-align:middle;margin-right:8px;">Standup Entry</h1>
        </div>
        
        <div class="content">
            <div class="date-display" th:text="${date.format(T(java.time.format.DateTimeFormatter).ofPattern('EEEE, MMMM d, yyyy'))}"></div>
            
            <div th:if="${hasContent}" class="entry-content" th:text="${content}"></div>
            <div th:unless="${hasContent}" class="entry-content no-entry">
                No standup entry for this date.
            </div>
            
            <div class="actions">
                <div class="button-row-top">
                    <a href="/" class="btn btn-accent">← Back to Calendar</a>
                    <a th:href="@{/edit/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" class="btn btn-secondary"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit Entry</a>
                </div>
                
                <div class="button-row-bottom" th:if="${hasContent}">
                    <form th:action="@{/delete/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" method="post" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this entry?')">
                        <button type="submit" class="btn btn-danger"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>Delete Entry</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // Session countdown timer - value calculated by backend
        const sessionTimeout = [[${sessionTimeout}]];
        const sessionTimerElement = document.getElementById('session-timer');
        const sessionTimerText = sessionTimerElement.querySelector('.session-timer-text');
        let remainingSeconds = sessionTimeout;
        console.log('Session timer initialized with', remainingSeconds, 'seconds remaining');
        
        function updateTimer() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            sessionTimerText.textContent = timeString;
            
            // Visual warnings
            if (remainingSeconds <= 60) {
                sessionTimerElement.classList.add('critical');
                sessionTimerElement.classList.remove('warning');
            } else if (remainingSeconds <= 180) {
                sessionTimerElement.classList.add('warning');
                sessionTimerElement.classList.remove('critical');
            }
            
            remainingSeconds--;
            
            if (remainingSeconds < 0) {
                window.location.href = '/logout';
            }
        }
        
        // Update timer every second
        updateTimer();
        setInterval(updateTimer, 1000);

        if (new URLSearchParams(window.location.search).get('saved') === 'true') {
            showToast('Entry saved', { type: 'success' });
            history.replaceState(null, '', window.location.pathname);
        }
    </script>
</body>
</html>
