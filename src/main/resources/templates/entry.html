<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup Entry</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-xl);
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-bold);
        }
        
        .content {
            padding: var(--spacing-xl);
        }
        
        .date-display {
            font-size: 24px;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }
        
        .entry-content {
            background: var(--background-dark);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            border: 1px solid var(--background-darker);
            margin-bottom: var(--spacing-lg);
            min-height: 200px;
            white-space: pre-wrap;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
        }
        
        .no-entry {
            color: var(--text-muted);
            font-style: italic;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0;
            text-align: center;
            width: 100%;
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            align-items: center;
        }
        
        .button-row-top {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .button-row-bottom {
            display: flex;
            justify-content: center;
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #1e90ff 100%);
            color: var(--background);
        }
        
        @media (max-width: 768px) {
            body {
                padding: var(--spacing-md);
            }
            
            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }
            
            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">🚪 Logout</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>📋 Standup Entry</h1>
        </div>
        
        <div class="content">
            <div class="date-display" th:text="${date.format(T(java.time.format.DateTimeFormatter).ofPattern('EEEE, MMMM d, yyyy'))}"></div>
            
            <div th:if="${hasContent}" class="entry-content" th:text="${content}"></div>
            <div th:unless="${hasContent}" class="entry-content no-entry">
                No standup entry for this date.
            </div>
            
            <div class="actions">
                <div class="button-row-top">
                    <a href="/" class="btn btn-accent">← Back to Calendar</a>
                    <a th:href="@{/edit/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" class="btn btn-secondary">✏️ Edit Entry</a>
                </div>
                
                <div class="button-row-bottom" th:if="${hasContent}">
                    <form th:action="@{/delete/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" method="post" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this entry?')">
                        <button type="submit" class="btn btn-danger">🗑️ Delete Entry</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
    </script>
</body>
</html>
