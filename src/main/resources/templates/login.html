<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App - Login</title>
    <script>(function(){var t=localStorage.getItem('standup_theme');document.documentElement.setAttribute('data-theme',t||'light');})();</script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .login-box {
            background: var(--background);
            padding: var(--spacing-xxl);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--background-dark);
        }
        
        .login-header {
            margin-bottom: var(--spacing-xl);
        }
        
        .login-header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            color: var(--text);
            font-weight: var(--font-weight-bold);
        }
        
        .login-header p {
            color: var(--text-light);
            font-size: 16px;
        }
        
        .login-form {
            text-align: left;
        }
        
        .submit-btn {
            width: 100%;
            font-size: 16px;
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        
        .form-footer {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--background-dark);
            text-align: center;
        }
        
        .form-footer p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            text-align: left;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: var(--spacing-sm);
            transform: scale(1.1);
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            user-select: none;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: var(--spacing-md);
            }

            .login-box {
                padding: var(--spacing-lg);
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()"></button>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>📋 Standup App</h1>
                <p>Please sign in to continue</p>
            </div>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form method="POST" action="/login" class="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="showPassword" onchange="togglePassword()">
                    <label for="showPassword">Show password</label>
                </div>
                
                <button type="submit" class="btn btn-secondary submit-btn">Sign In</button>
            </form>
            
            <div class="form-footer">
                <p>Secure login • Session expires in 8 hours</p>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const showPasswordCheckbox = document.getElementById('showPassword');
            
            if (showPasswordCheckbox.checked) {
                passwordField.type = 'text';
            } else {
                passwordField.type = 'password';
            }
        }
    </script>
</body>
</html>
