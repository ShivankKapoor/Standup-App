<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <title> Edit Entry</title>
    <script>(function(){var t=localStorage.getItem('standup_theme');document.documentElement.setAttribute('data-theme',t||'light');})();</script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/toast.js}"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
        }
        
        .session-timer {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.95);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }
        
        .session-timer img {
            width: 32px;
            height: 32px;
        }
        
        .session-timer-text {
            font-size: 16px;
            font-weight: var(--font-weight-semibold);
            font-family: var(--font-family-mono);
            color: var(--text);
        }
        
        .session-timer.warning {
            background: rgba(255, 193, 7, 0.95);
            animation: pulse 1s infinite;
        }
        
        .session-timer.warning .session-timer-text {
            color: var(--background);
        }
        
        .session-timer.critical {
            background: rgba(220, 53, 69, 0.95);
            animation: pulse 0.5s infinite;
        }
        
        .session-timer.critical .session-timer-text {
            color: var(--background);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-xl);
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-bold);
        }
        
        .content {
            padding: var(--spacing-xl);
        }
        
        .date-display {
            font-size: 24px;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }
        
        .form-group {
            margin-bottom: var(--spacing-lg);
        }
        
        .form-group label {
            display: block;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            font-size: 18px;
        }
        
        .form-group textarea {
            width: 100%;
            min-height: 300px;
            padding: var(--spacing-md);
            border: 2px solid var(--background-darker);
            border-radius: var(--border-radius-md);
            font-size: 14px;
            font-family: var(--font-family-mono);
            line-height: 1.5;
            resize: vertical;
            transition: border-color var(--transition-normal);
            color: var(--text);
            background-color: var(--background);
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .form-group select {
            width: 100%;
            padding: var(--spacing-md);
            border: 2px solid var(--background-darker);
            border-radius: var(--border-radius-md);
            font-size: 14px;
            line-height: 1.5;
            transition: border-color var(--transition-normal);
            color: var(--text);
            background-color: var(--background);
        }
        
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .character-count {
            text-align: right;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: var(--spacing-xs);
        }
        
        [data-theme="dark"] .session-timer {
            background: rgba(26, 29, 46, 0.95);
        }

        @media (max-width: 768px) {
            body {
                padding: var(--spacing-md);
            }

            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }

            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </a>
    </div>

    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()"></button>

    <div class="session-timer" id="session-timer">
        <img th:src="@{/images/hourglass.apng}" alt="Timer">
        <span class="session-timer-text">15:00</span>
    </div>

    <div class="container">
        <div class="header">
            <h1><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:8px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit Entry</h1>
        </div>
        
        <div class="content">
            <div class="date-display" th:text="${date.format(T(java.time.format.DateTimeFormatter).ofPattern('EEEE, MMMM d, yyyy'))}"></div>
            
            <form th:action="@{/save/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" method="post">
                <div class="form-group">
                    <label for="dayType">Day Type:</label>
                    <select id="dayType" name="dayType" class="form-select">
                        <option value="" th:selected="${dayType == ''}">Regular Day</option>
                        <option value="PTO" th:selected="${dayType == 'PTO'}">Set PTO</option>
                        <option value="Planning" th:selected="${dayType == 'Planning'}">Set Planning</option>
                        <option value="Support" th:selected="${dayType == 'Support'}">Set Support</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: var(--spacing-md);">
                        <label for="content" style="margin-bottom:0;">Standup Entry:</label>
                        <button type="button" class="btn btn-outline-secondary" id="apply-template-btn" style="font-size:13px; padding: var(--spacing-sm) var(--spacing-md);">Apply Template</button>
                    </div>
                    <textarea id="content" name="content" th:text="${content}" class="form-textarea"
                              placeholder="What did you work on today? What are you planning for tomorrow? Any blockers?"></textarea>
                    <div class="character-count">
                        <span id="char-count">0</span> / 50,000 characters
                    </div>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-secondary"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save Entry</button>
                    <a th:href="@{/entry/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" class="btn btn-accent">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // Session countdown timer - value calculated by backend
        const sessionTimeout = [[${sessionTimeout}]];
        const sessionTimerElement = document.getElementById('session-timer');
        const sessionTimerText = sessionTimerElement.querySelector('.session-timer-text');
        let remainingSeconds = sessionTimeout;
        console.log('Session timer initialized with', remainingSeconds, 'seconds remaining');
        
        function updateSessionTimer() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            sessionTimerText.textContent = timeString;
            
            // Visual warnings
            if (remainingSeconds <= 60) {
                sessionTimerElement.classList.add('critical');
                sessionTimerElement.classList.remove('warning');
            } else if (remainingSeconds <= 180) {
                sessionTimerElement.classList.add('warning');
                sessionTimerElement.classList.remove('critical');
            }
            
            remainingSeconds--;
            
            if (remainingSeconds < 0) {
                window.location.href = '/logout';
            }
        }
        
        // Update session timer every second
        updateSessionTimer();
        setInterval(updateSessionTimer, 1000);
        
        // Character counter
        const textarea = document.getElementById('content');
        const charCount = document.getElementById('char-count');
        
        function updateCharCount() {
            const count = textarea.value.length;
            charCount.textContent = count.toLocaleString();
            
            if (count > 50000) {
                charCount.style.color = 'var(--error)';
            } else if (count > 45000) {
                charCount.style.color = 'var(--warning)';
            } else {
                charCount.style.color = 'var(--text-muted)';
            }
        }
        
        // Initialize character count
        updateCharCount();
        
        // Update character count on input
        textarea.addEventListener('input', updateCharCount);

        document.getElementById('apply-template-btn').addEventListener('click', function() {
            if (textarea.value.trim() !== '') {
                showToast('Clear the entry before applying the template', { type: 'error' });
                return;
            }
            textarea.value = "📆 What you did yesterday\n👉 What you are doing today\n🛑 Blockers preventing you from making progress";
            updateCharCount();
            textarea.focus();
        });
    </script>
</body>
</html>
