<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Edit Entry</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-xl);
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-bold);
        }
        
        .content {
            padding: var(--spacing-xl);
        }
        
        .date-display {
            font-size: 24px;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }
        
        .form-group {
            margin-bottom: var(--spacing-lg);
        }
        
        .form-group label {
            display: block;
            margin-bottom: var(--spacing-md);
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            font-size: 18px;
        }
        
        .form-group textarea {
            width: 100%;
            min-height: 300px;
            padding: var(--spacing-md);
            border: 2px solid var(--background-darker);
            border-radius: var(--border-radius-md);
            font-size: 14px;
            font-family: var(--font-family-mono);
            line-height: 1.5;
            resize: vertical;
            transition: border-color var(--transition-normal);
            color: var(--text);
            background-color: var(--background);
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .character-count {
            text-align: right;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: var(--spacing-xs);
        }
        
        @media (max-width: 768px) {
            body {
                padding: var(--spacing-md);
            }
            
            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }
            
            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">🚪 Logout</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>📝 Edit Entry</h1>
        </div>
        
        <div class="content">
            <div class="date-display" th:text="${date.format(T(java.time.format.DateTimeFormatter).ofPattern('EEEE, MMMM d, yyyy'))}"></div>
            
            <form th:action="@{/save/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" method="post">
                <div class="form-group">
                    <label for="content">Standup Entry:</label>
                    <textarea id="content" name="content" th:text="${content}" class="form-textarea"
                              placeholder="What did you work on today? What are you planning for tomorrow? Any blockers?"></textarea>
                    <div class="character-count">
                        <span id="char-count">0</span> / 50,000 characters
                    </div>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-secondary">💾 Save Entry</button>
                    <a th:href="@{/entry/{date}(date=${date.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd'))})}" class="btn btn-accent">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // Character counter
        const textarea = document.getElementById('content');
        const charCount = document.getElementById('char-count');
        
        function updateCharCount() {
            const count = textarea.value.length;
            charCount.textContent = count.toLocaleString();
            
            if (count > 50000) {
                charCount.style.color = 'var(--error)';
            } else if (count > 45000) {
                charCount.style.color = 'var(--warning)';
            } else {
                charCount.style.color = 'var(--text-muted)';
            }
        }
        
        // Initialize character count
        updateCharCount();
        
        // Update character count on input
        textarea.addEventListener('input', updateCharCount);
    </script>
</body>
</html>
