<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <title>📋 Logged Out</title>
    <script>(function(){var t=localStorage.getItem('standup_theme');document.documentElement.setAttribute('data-theme',t||'light');})();</script>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script th:src="@{/js/theme.js}"></script>
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
        }
        
        .logout-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
        }
        
        .logout-box {
            background: var(--background);
            padding: var(--spacing-xxl);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--background-dark);
        }
        
        .logout-header {
            margin-bottom: var(--spacing-xl);
        }
        
        .logout-header h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-md);
            color: var(--text);
            font-weight: var(--font-weight-bold);
        }
        
        .logout-message {
            color: var(--success);
            font-size: 18px;
            margin-bottom: var(--spacing-lg);
            font-weight: var(--font-weight-medium);
        }
        
        .redirect-message {
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: var(--spacing-lg);
        }
        
        .login-link {
            display: inline-block;
            background: var(--secondary);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }
        
        .login-link:hover {
            background: var(--secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .countdown {
            font-weight: var(--font-weight-semibold);
            color: var(--primary);
        }
        
        @media (max-width: 480px) {
            .logout-container {
                padding: var(--spacing-md);
            }

            .logout-box {
                padding: var(--spacing-lg);
            }

            .logout-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button id="theme-toggle-btn" class="theme-toggle-btn" onclick="toggleTheme()"></button>
    <div class="logout-container">
        <div class="logout-box">
            <div class="logout-header">
                <h1>📋 Standup App</h1>
            </div>
            
            <div class="logout-message">
                ✅ You have been logged out successfully!
            </div>
            
            <div class="redirect-message">
                Redirecting to login page in <span class="countdown" id="countdown">3</span> seconds...
            </div>
            
            <a href="/login" class="btn btn-primary login-link">Return to Login</a>
        </div>
    </div>

    <script>
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(function() {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = '/login';
            }
        }, 1000);
    </script>
</body>
</html>
