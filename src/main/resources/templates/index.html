<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-md);
            overflow-x: hidden;
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            z-index: 1000;
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 1200px;
            min-height: calc(100vh - calc(var(--spacing-md) * 2));
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-xl);
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: var(--spacing-sm);
            font-weight: var(--font-weight-bold);
        }
        
        .time-date-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: 0;
        }
        
        .live-time {
            font-size: 16px;
            font-weight: var(--font-weight-bold);
            color: var(--background);
            background: rgba(255, 255, 255, 0.05);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--border-radius-sm);
            display: inline-block;
            font-family: var(--font-family-mono);
            letter-spacing: 0.5px;
            border: none;
            backdrop-filter: blur(10px);
            margin: 0;
            min-width: 140px;
            text-align: center;
        }
        
        .current-date {
            font-size: 14px;
            font-weight: var(--font-weight-medium);
            color: rgba(255, 255, 255, 0.8);
            background: none;
            padding: 0;
            border-radius: 0;
            display: inline-block;
            border: none;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-xl);
            background: var(--background-dark);
            border-bottom: 1px solid var(--background-darker);
            flex-shrink: 0;
        }
        
        .nav-btn {
            background: var(--secondary);
            color: var(--background);
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-weight: var(--font-weight-medium);
            text-decoration: none;
            display: inline-block;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }
        
        .nav-btn:hover {
            background: var(--secondary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .month-year {
            font-size: 20px;
            font-weight: var(--font-weight-semibold);
            color: #000000;
        }
        
        .calendar {
            padding: var(--spacing-lg);
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto repeat(6, 1fr);
            gap: 1px;
            background: var(--background-darker);
            border: 1px solid var(--background-darker);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            flex: 1;
            min-height: 400px;
            height: auto;
        }
        
        .day-header {
            background: var(--background-dark);
            padding: var(--spacing-md) var(--spacing-xs);
            text-align: center;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            font-size: 14px;
        }
        
        .day-cell {
            background: var(--background);
            padding: var(--spacing-sm) var(--spacing-xs);
            position: relative;
            cursor: pointer;
            transition: background-color var(--transition-normal);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .day-cell:hover {
            background: var(--background-dark);
        }
        
        .day-cell.other-month {
            background: var(--background-dark);
            color: var(--text-muted);
        }
        
        .day-cell.today {
            background: var(--primary-light);
            border: 2px solid var(--primary);
        }
        
        .day-cell.has-entry::after {
            content: '';
            position: absolute;
            bottom: var(--spacing-xs);
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
        }
        
        .day-cell.today.has-entry::after {
            background: var(--secondary);
        }
        
        .day-number {
            font-size: 14px;
            font-weight: var(--font-weight-medium);
        }
        
        @media (max-width: 768px) {
            body {
                padding: var(--spacing-sm);
                overflow-x: hidden;
                overflow-y: auto;
            }
            
            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }
            
            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .container {
                min-height: auto;
                max-height: none;
                margin-bottom: var(--spacing-lg);
            }
            
            .calendar-nav {
                flex-direction: column;
                gap: var(--spacing-md);
                text-align: center;
                padding: var(--spacing-md) var(--spacing-lg);
            }
            
            .calendar {
                padding: var(--spacing-md);
                overflow-y: visible;
            }
            
            .calendar-grid {
                min-height: 350px;
                height: auto;
                grid-template-rows: auto repeat(6, minmax(50px, auto));
            }
            
            .day-cell {
                font-size: 12px;
                min-height: 50px;
                padding: var(--spacing-xs);
            }
            
            .day-header {
                font-size: 12px;
                padding: var(--spacing-sm) var(--spacing-xs);
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .time-date-container {
                flex-direction: column;
                gap: var(--spacing-xs);
            }
            
            .live-time {
                font-size: 14px;
                padding: var(--spacing-xs) var(--spacing-sm);
                min-width: 120px;
                letter-spacing: 0.25px;
            }
            
            .current-date {
                font-size: 11px;
                letter-spacing: 0.5px;
            }
            
            .header {
                padding: var(--spacing-sm) var(--spacing-lg);
            }
            
            .month-year {
                font-size: 18px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: var(--spacing-xs);
            }
            
            .container {
                border-radius: var(--border-radius-md);
            }
            
            .calendar {
                padding: var(--spacing-sm);
            }
            
            .calendar-grid {
                min-height: 320px;
                grid-template-rows: auto repeat(6, minmax(45px, auto));
            }
            
            .day-cell {
                min-height: 45px;
                font-size: 11px;
            }
            
            .day-header {
                font-size: 11px;
                padding: var(--spacing-xs);
            }
            
            .header {
                padding: var(--spacing-xs) var(--spacing-md);
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .calendar-nav {
                padding: var(--spacing-sm) var(--spacing-md);
            }
            
            .nav-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .month-year {
                font-size: 16px;
            }
            
            .live-time {
                font-size: 13px;
                min-width: 110px;
            }
            
            .current-date {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">🚪 Logout</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>📋 Standup App</h1>
            <div class="time-date-container">
                <div class="live-time" id="live-time">Loading...</div>
                <div class="current-date" id="current-date">Loading date...</div>
            </div>
        </div>
        
        <div class="calendar-nav">
            <a th:href="@{/(month=${displayDate.minusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">← Previous</a>
            <div class="month-year" th:text="${displayDate.format(T(java.time.format.DateTimeFormatter).ofPattern('MMMM yyyy'))}"></div>
            <a th:href="@{/(month=${displayDate.plusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">Next →</a>
        </div>
        
        <div class="calendar">
            <div class="calendar-grid">
                <div class="day-header">Sun</div>
                <div class="day-header">Mon</div>
                <div class="day-header">Tue</div>
                <div class="day-header">Wed</div>
                <div class="day-header">Thu</div>
                <div class="day-header">Fri</div>
                <div class="day-header">Sat</div>
                
                <!-- Calendar days generated by CalendarService -->
                <div th:each="day : ${calendarDays}" 
                     th:class="${day.cssClasses}"
                     th:data-date="${day.dateString}"
                     onclick="navigateToEntry(this.dataset.date)">
                    <div class="day-number" th:text="${day.dayNumber}"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // Live time display using WorldTimeAPI (Chicago timezone)
        let serverTimeOffset = 0;
        let lastSyncTime = 0;
        
        async function syncWithTimeAPI() {
            try {
                // Use WorldTimeAPI for Chicago timezone (CST/CDT)
                const response = await fetch('https://worldtimeapi.org/api/timezone/America/Chicago');
                const data = await response.json();
                
                if (data.unixtime) {
                    const apiTime = data.unixtime * 1000; // Convert to milliseconds
                    const localTime = Date.now();
                    serverTimeOffset = apiTime - localTime;
                    lastSyncTime = localTime;
                    console.log('Synced with WorldTime API (Chicago timezone)');
                    
                    // Update date immediately
                    updateDate(new Date(apiTime));
                }
            } catch (error) {
                console.log('WorldTime API sync failed, using local time:', error);
                serverTimeOffset = 0;
                updateDate(new Date());
            }
        }
        
        function updateTime() {
            const localTime = Date.now();
            
            // Re-sync every 10 minutes to maintain accuracy
            if (localTime - lastSyncTime > 10 * 60 * 1000) {
                syncWithTimeAPI();
            }
            
            // Calculate accurate time using server offset
            const accurateTime = new Date(localTime + serverTimeOffset);
            const timeString = accurateTime.toLocaleTimeString('en-US', {
                hour12: true,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                timeZone: 'America/Chicago'
            });
            
            const liveTimeElement = document.getElementById('live-time');
            if (liveTimeElement) {
                liveTimeElement.textContent = timeString + ' CST';
            }
        }
        
        function updateDate(date) {
            const dateString = date.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                timeZone: 'America/Chicago'
            });
            
            const dateElement = document.getElementById('current-date');
            if (dateElement) {
                dateElement.textContent = dateString;
            }
        }
        
        // Initialize time sync and start updates
        syncWithTimeAPI().then(() => {
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        function navigateToEntry(dateString) {
            window.location.href = '/entry/' + dateString;
        }
    </script>
</body>
</html>
