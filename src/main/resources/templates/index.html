<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            min-height: 100vh;
            padding: var(--spacing-md);
            padding-bottom: calc(var(--spacing-lg) * 3 + 48px); /* leave room for corner buttons */
            overflow-x: hidden;
        }
        
        .logout-container {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            z-index: 1000;
        }
        
        .session-timer {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.95);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }
        
        .session-timer img {
            width: 32px;
            height: 32px;
        }
        
        .session-timer-text {
            font-size: 16px;
            font-weight: var(--font-weight-semibold);
            font-family: var(--font-family-mono);
            color: var(--text);
        }
        
        .session-timer.warning {
            background: rgba(255, 193, 7, 0.95);
            animation: pulse 1s infinite;
        }
        
        .session-timer.warning .session-timer-text {
            color: var(--background);
        }
        
        .session-timer.critical {
            background: rgba(220, 53, 69, 0.95);
            animation: pulse 0.5s infinite;
        }
        
        .session-timer.critical .session-timer-text {
            color: var(--background);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .logout-btn {
            background: var(--warn);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
            display: inline-block;
            box-shadow: var(--shadow-md);
        }
        
        .logout-btn:hover {
            background: var(--warn-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .container {
            max-width: 1200px;
            min-height: calc(100vh - calc(var(--spacing-md) * 2));
            margin: 0 auto;
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--background);
            padding: var(--spacing-md) var(--spacing-xl);
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: var(--spacing-sm);
            font-weight: var(--font-weight-bold);
        }
        
        .time-date-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: 0;
        }
        
        .live-time {
            font-size: 16px;
            font-weight: var(--font-weight-bold);
            color: var(--background);
            background: rgba(255, 255, 255, 0.05);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--border-radius-sm);
            display: inline-block;
            font-family: var(--font-family-mono);
            letter-spacing: 0.5px;
            border: none;
            backdrop-filter: blur(10px);
            margin: 0;
            min-width: 140px;
            text-align: center;
        }
        
        .current-date {
            font-size: 14px;
            font-weight: var(--font-weight-medium);
            color: rgba(255, 255, 255, 0.8);
            background: none;
            padding: 0;
            border-radius: 0;
            display: inline-block;
            border: none;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .weather-box {
            position: fixed;
            top: var(--spacing-md);
            left: var(--spacing-md);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            background: rgba(255, 255, 255, 0.97);
            padding: 8px 14px;
            border-radius: var(--border-radius-md);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.10);
            backdrop-filter: blur(10px);
            border-left: 3px solid var(--secondary);
            min-width: 160px;
        }

        .weather-box.loaded {
            display: flex;
        }
        
        .weather-city {
            display: none;
            font-size: 11px;
            font-weight: var(--font-weight-medium);
            color: #999;
            margin-top: 0;
            padding-left: 28px;
        }
        
        .weather-city.loaded {
            display: block;
        }
        
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-xl);
            background: var(--background-dark);
            border-bottom: 1px solid var(--background-darker);
            flex-shrink: 0;
        }
        
        .nav-btn {
            background: var(--secondary);
            color: var(--background);
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-weight: var(--font-weight-medium);
            text-decoration: none;
            display: inline-block;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }
        
        .nav-btn:hover {
            background: var(--secondary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .month-year {
            font-size: 20px;
            font-weight: var(--font-weight-semibold);
            color: #000000;
        }
        
        .weather-display {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: var(--font-weight-bold);
            color: var(--text);
            white-space: nowrap;
        }
        
        .weather-display.loaded {
            display: flex;
        }
        
        .weather-temp {
            color: var(--text);
            font-weight: var(--font-weight-bold);
        }
        
        .calendar {
            padding: var(--spacing-lg);
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto repeat(6, 1fr);
            gap: 1px;
            background: var(--background-darker);
            border: 1px solid var(--background-darker);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            flex: 1;
            min-height: 400px;
            height: auto;
        }
        
        .day-header {
            background: var(--background-dark);
            padding: var(--spacing-md) var(--spacing-xs);
            text-align: center;
            font-weight: var(--font-weight-semibold);
            color: var(--text);
            font-size: 14px;
        }
        
        .day-cell {
            background: var(--background);
            padding: var(--spacing-sm) var(--spacing-xs);
            position: relative;
            cursor: pointer;
            transition: background-color var(--transition-normal);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .day-cell:hover {
            background: var(--background-dark);
        }
        
        .day-cell.other-month {
            background: var(--background-dark);
            color: var(--text-muted);
        }
        
        .day-cell.today {
            background: var(--primary-light);
            border: 2px solid var(--primary);
        }
        
        .day-cell.has-entry::after {
            content: '';
            position: absolute;
            bottom: var(--spacing-xs);
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
        }
        /* PTO = purple dot */
        .day-cell.pto-day::after {
            background: #a259e6;
        }
        /* Planning = green dot */
        .day-cell.planning-day::after {
            background: #2ecc40;
        }
        /* Support = yellow dot */
        .day-cell.support-day::after {
            background: #ffe066;
        }
        
        .day-number {
            font-size: 14px;
            font-weight: var(--font-weight-medium);
        }
        
        /* Heatmap Styles */
        .heatmap-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            padding: var(--spacing-md);
            overflow-y: auto;
        }
        
        .heatmap-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .heatmap-container {
            background: var(--background);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            padding: var(--spacing-xl);
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .heatmap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-md);
            border-bottom: 2px solid var(--background-darker);
        }
        
        .heatmap-header h2 {
            font-size: 24px;
            color: var(--primary);
            margin: 0;
        }
        
        .close-btn {
            background: var(--warn);
            color: var(--background);
            border: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-weight: var(--font-weight-medium);
            transition: all var(--transition-normal);
        }
        
        .close-btn:hover {
            background: var(--warn-dark);
            transform: scale(1.05);
        }
        
        .period-selector {
            display: flex;
            justify-content: center;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-sm);
            background: var(--background-dark);
            border-radius: var(--border-radius-md);
        }
        
        .period-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-weight: var(--font-weight-medium);
            font-size: 14px;
            transition: all var(--transition-normal);
            min-width: 60px;
        }
        
        .period-btn:hover {
            background: var(--background-darker);
            color: var(--text);
        }
        
        .period-btn.active {
            background: var(--primary);
            color: var(--background);
            border-color: var(--primary);
        }
        
        .weekend-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: var(--spacing-md);
        }
        
        .weekend-toggle-label {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }
        
        .weekend-toggle-label:hover {
            color: var(--text);
        }
        
        .weekend-toggle-label input[type="checkbox"] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--background-dark) 100%);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            text-align: center;
            box-shadow: var(--shadow-md);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: var(--font-weight-bold);
            color: var(--primary);
            margin-bottom: var(--spacing-xs);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: var(--font-weight-medium);
        }
        
        .heatmap-grid-container {
            background: var(--background-dark);
            padding: var(--spacing-lg);
            border-radius: var(--border-radius-md);
            overflow-x: auto;
        }
        
        .heatmap-legend {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            font-size: 14px;
            color: var(--text);
        }
        
        .legend-scale {
            display: flex;
            gap: var(--spacing-xs);
        }
        
        .legend-box {
            width: 15px;
            height: 15px;
            border-radius: 2px;
        }
        
        .legend-box[data-intensity="0"] {
            background: var(--background-darker);
        }
        
        .legend-box[data-intensity="1"] {
            background: rgba(255, 127, 80, 0.3);
        }
        
        .legend-box[data-intensity="2"] {
            background: rgba(255, 127, 80, 0.6);
        }
        
        .legend-box[data-intensity="3"] {
            background: rgba(255, 127, 80, 0.85);
        }
        
        .legend-box[data-intensity="4"] {
            background: rgb(255, 127, 80);
        }
        
        .heatmap-grid {
            display: grid;
            grid-template-columns: auto repeat(53, 12px);
            gap: 3px;
            font-size: 10px;
        }
        
        .month-label {
            grid-column: span 1;
            font-size: 11px;
            color: var(--text-muted);
            padding-right: var(--spacing-xs);
            display: flex;
            align-items: center;
        }
        
        .heatmap-day {
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .heatmap-day:hover {
            transform: scale(1.5);
            z-index: 10;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        
        .heatmap-day[data-intensity="0"] {
            background: var(--background-darker);
        }
        
        .heatmap-day[data-intensity="1"] {
            background: rgba(255, 127, 80, 0.3);
        }
        
        .heatmap-day[data-intensity="2"] {
            background: rgba(255, 127, 80, 0.6);
        }
        
        .heatmap-day[data-intensity="3"] {
            background: rgba(255, 127, 80, 0.85);
        }
        
        .heatmap-day[data-intensity="4"] {
            background: rgb(255, 127, 80);
        }
        
        /* Special day type colors - override intensity colors */
        .heatmap-day.pto-day {
            background: #a259e6 !important;
        }
        
        .heatmap-day.planning-day {
            background: #2ecc40 !important;
        }
        
        .heatmap-day.support-day {
            background: #ffe066 !important;
        }
        
        .heatmap-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: var(--spacing-sm);
            border-radius: var(--border-radius-sm);
            font-size: 12px;
            pointer-events: none;
            z-index: 3000;
            display: none;
        }
        
        .summary-btn {
            position: fixed;
            bottom: calc(var(--spacing-lg) + 56px + 8px); /* timer position + timer height + gap */
            right: var(--spacing-lg);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text);
            border: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-lg);
            cursor: pointer;
            font-weight: var(--font-weight-semibold);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 16px;
            font-family: var(--font-family-mono);
            white-space: nowrap;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }
        
        .summary-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: var(--shadow-xl);
        }

        @media (max-width: 768px) {
            body {
                padding: var(--spacing-sm);
                overflow-x: hidden;
                overflow-y: auto;
                padding-bottom: 120px; /* keep buttons off calendar on mobile */
            }
            .summary-btn {
                bottom: calc(var(--spacing-lg) + 56px + 8px);
                right: var(--spacing-sm);
            }
            .session-timer {
                right: var(--spacing-sm);
            }
            
            .logout-container {
                position: static;
                text-align: right;
                margin-bottom: var(--spacing-md);
                padding: 0 var(--spacing-md);
            }
            
            .logout-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .container {
                min-height: auto;
                max-height: none;
                margin-bottom: var(--spacing-lg);
            }
            
            .calendar-nav {
                flex-direction: column;
                gap: var(--spacing-md);
                text-align: center;
                padding: var(--spacing-md) var(--spacing-lg);
            }
            
            .calendar {
                padding: var(--spacing-md);
                overflow-y: visible;
            }
            
            .calendar-grid {
                min-height: 350px;
                height: auto;
                grid-template-rows: auto repeat(6, minmax(50px, auto));
            }
            
            .day-cell {
                font-size: 12px;
                min-height: 50px;
                padding: var(--spacing-xs);
            }
            
            .day-header {
                font-size: 12px;
                padding: var(--spacing-sm) var(--spacing-xs);
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .time-date-container {
                flex-direction: column;
                gap: var(--spacing-xs);
            }
            
            .live-time {
                font-size: 14px;
                padding: var(--spacing-xs) var(--spacing-sm);
                min-width: 120px;
                letter-spacing: 0.25px;
            }
            
            .current-date {
                font-size: 11px;
                letter-spacing: 0.5px;
            }
            
            .header {
                padding: var(--spacing-sm) var(--spacing-lg);
            }
            
            .month-year {
                font-size: 18px;
            }
            
            .summary-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
                bottom: calc(var(--spacing-md) + 56px + 8px);
                right: var(--spacing-md);
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: var(--spacing-xs);
            }
            
            .container {
                border-radius: var(--border-radius-md);
            }
            
            .calendar {
                padding: var(--spacing-sm);
            }
            
            .calendar-grid {
                min-height: 320px;
                grid-template-rows: auto repeat(6, minmax(45px, auto));
            }
            
            .day-cell {
                min-height: 45px;
                font-size: 11px;
            }
            
            .day-header {
                font-size: 11px;
                padding: var(--spacing-xs);
            }
            
            .header {
                padding: var(--spacing-xs) var(--spacing-md);
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .calendar-nav {
                padding: var(--spacing-sm) var(--spacing-md);
            }
            
            .nav-btn {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 14px;
            }
            
            .month-year {
                font-size: 16px;
            }
            
            .live-time {
                font-size: 13px;
                min-width: 110px;
            }
            
            .current-date {
                font-size: 10px;
            }
            
            .summary-btn {
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 12px;
                bottom: calc(var(--spacing-sm) + 56px + 8px);
                right: var(--spacing-sm);
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">🚪 Logout</a>
    </div>
    
    <button class="summary-btn" onclick="showHeatmap()">
        <span style="font-size: 20px;">📊</span>
        <span>Stats</span>
    </button>
    
    <div class="session-timer" id="session-timer">
        <img th:src="@{/images/hourglass.apng}" alt="Timer">
        <span class="session-timer-text">15:00</span>
    </div>

    <div class="weather-box" id="weather-box">
        <div class="weather-display" id="weather-display"></div>
        <div class="weather-city" id="weather-city"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📋 Standup App</h1>
            <div class="time-date-container">
                <div class="live-time" id="live-time">Loading...</div>
                <div class="current-date" id="current-date">Loading date...</div>
            </div>
        </div>
        
        <div class="calendar-nav">
            <a th:href="@{/(month=${displayDate.minusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">← Previous</a>
            <div class="month-year" th:text="${displayDate.format(T(java.time.format.DateTimeFormatter).ofPattern('MMMM yyyy'))}"></div>
            <a th:href="@{/(month=${displayDate.plusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">Next →</a>
        </div>
        <!-- Color Key Legend -->
    <div class="calendar-key" style="display: flex; gap: 1rem; justify-content: center; align-items: center; margin: 0.2rem 0 0.1rem 0;">
            <span style="display: flex; align-items: center; gap: 0.3rem; font-size: 13px;">
                <span style="width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; display: inline-block;"></span>
                Regular Entry
            </span>
            <span style="display: flex; align-items: center; gap: 0.3rem; font-size: 13px;">
                <span style="width: 10px; height: 10px; background: #a259e6; border-radius: 50%; display: inline-block;"></span>
                PTO
            </span>
            <span style="display: flex; align-items: center; gap: 0.3rem; font-size: 13px;">
                <span style="width: 10px; height: 10px; background: #2ecc40; border-radius: 50%; display: inline-block;"></span>
                Planning
            </span>
            <span style="display: flex; align-items: center; gap: 0.3rem; font-size: 13px;">
                <span style="width: 10px; height: 10px; background: #ffe066; border-radius: 50%; display: inline-block;"></span>
                Support
            </span>
        </div>
        
        <div class="calendar">
            <div class="calendar-grid">
                <div class="day-header">Sun</div>
                <div class="day-header">Mon</div>
                <div class="day-header">Tue</div>
                <div class="day-header">Wed</div>
                <div class="day-header">Thu</div>
                <div class="day-header">Fri</div>
                <div class="day-header">Sat</div>
                
                <!-- Calendar days generated by CalendarService -->
                <div th:each="day : ${calendarDays}" 
                     th:class="${day.cssClasses}"
                     th:data-date="${day.dateString}"
                     onclick="navigateToEntry(this.dataset.date)">
                    <div class="day-number" th:text="${day.dayNumber}"></div>
                    <!-- Dot color is set by .pto-day or .planning-day class -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Heatmap Modal -->
    <div class="heatmap-modal" id="heatmap-modal">
        <div class="heatmap-container">
            <div class="heatmap-header">
                <h2>📊 Activity Heatmap</h2>
                <button class="close-btn" onclick="closeHeatmap()">✕ Close</button>
            </div>
            
            <div class="period-selector">
                <button class="period-btn" onclick="changePeriod(7)" data-days="7">7D</button>
                <button class="period-btn" onclick="changePeriod(30)" data-days="30">30D</button>
                <button class="period-btn" onclick="changePeriod(90)" data-days="90">90D</button>
                <button class="period-btn" onclick="changePeriod(180)" data-days="180">180D</button>
                <button class="period-btn active" onclick="changePeriod(365)" data-days="365">1Y</button>
                <button class="period-btn" onclick="changePeriod(9999)" data-days="9999">All</button>
            </div>
            
            <div class="weekend-toggle">
                <label class="weekend-toggle-label">
                    <input type="checkbox" id="hide-weekends-checkbox" onchange="onWeekendToggle()">
                    Hide Weekends
                </label>
            </div>
            
            <div class="stats-grid" id="stats-grid">
                <!-- Stats will be populated by JavaScript -->
            </div>
            
            <div class="heatmap-grid-container">
                <div class="heatmap-legend">
                    <span>Less</span>
                    <div class="legend-scale">
                        <div class="legend-box" data-intensity="0"></div>
                        <div class="legend-box" data-intensity="1"></div>
                        <div class="legend-box" data-intensity="2"></div>
                        <div class="legend-box" data-intensity="3"></div>
                        <div class="legend-box" data-intensity="4"></div>
                    </div>
                    <span>More</span>
                </div>
                <div id="heatmap-grid">
                    <!-- Heatmap will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>
    
    <div class="heatmap-tooltip" id="heatmap-tooltip"></div>

    <script th:inline="javascript">
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        // Live time and date display
        function updateTime() {
            const now = new Date();
            
            // Update time display
            const timeString = now.toLocaleTimeString('en-US', {
                hour12: true,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const liveTimeElement = document.getElementById('live-time');
            if (liveTimeElement) {
                liveTimeElement.textContent = timeString;
            }
            
            // Update date display
            const dateString = now.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
            
            const dateElement = document.getElementById('current-date');
            if (dateElement) {
                dateElement.textContent = dateString;
            }
        }
        
        // Initialize time updates
        updateTime();
        setInterval(updateTime, 1000);
        
        // Weather via Browser Geolocation + open-meteo (no API key needed)
        function getWeatherInfo(code, isDay) {
            if (code === 0)                    return { emoji: isDay ? '☀️'  : '🌕',  label: 'Clear' };
            if (code === 1)                    return { emoji: isDay ? '🌤️' : '🌙',  label: 'Mainly Clear' };
            if (code === 2)                    return { emoji: isDay ? '⛅'  : '🌙',  label: 'Partly Cloudy' };
            if (code === 3)                    return { emoji: '☁️',  label: 'Overcast' };
            if (code >= 45 && code <= 48)      return { emoji: '🌫️', label: 'Foggy' };
            if (code >= 51 && code <= 57)      return { emoji: '🌦️', label: 'Drizzle' };
            if (code >= 61 && code <= 67)      return { emoji: '🌧️', label: 'Rain' };
            if (code >= 71 && code <= 77)      return { emoji: '❄️',  label: 'Snow' };
            if (code >= 80 && code <= 82)      return { emoji: '🌨️', label: 'Showers' };
            if (code === 85 || code === 86)    return { emoji: '🌨️', label: 'Snow Showers' };
            if (code >= 95 && code <= 99)      return { emoji: '⛈️',  label: 'Thunderstorm' };
            return { emoji: '🌡️', label: '' };
        }
        
        const WEATHER_CACHE_KEY = 'standup_weather_cache';
        const WEATHER_CACHE_TTL = 30 * 60 * 1000; // 30 minutes

        function applyWeatherData(emoji, temp, city) {
            const el = document.getElementById('weather-display');
            if (el) {
                el.innerHTML = `<span>${emoji}</span><span class="weather-temp">${temp}°F</span>`;
                el.classList.add('loaded');
                const box = document.getElementById('weather-box');
                if (box) box.classList.add('loaded');
            }
            if (city) {
                const cityEl = document.getElementById('weather-city');
                if (cityEl) {
                    cityEl.textContent = city;
                    cityEl.classList.add('loaded');
                }
            }
        }

        async function fetchWeatherByCoords(latitude, longitude, fallbackCity) {
            try {
                const weatherUrl = `https://api.open-meteo.com/v1/forecast` +
                    `?latitude=${latitude}&longitude=${longitude}` +
                    `&current=temperature_2m,weathercode,is_day` +
                    `&temperature_unit=fahrenheit&timezone=auto`;

                const fetches = [fetch(weatherUrl)];
                if (!fallbackCity) {
                    fetches.push(fetch(
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`,
                        { headers: { 'Accept-Language': 'en' } }
                    ));
                }

                const [weatherResp, geoResp] = await Promise.all(fetches);

                let emoji = '', temp = null, city = fallbackCity || '';

                if (weatherResp.ok) {
                    const data = await weatherResp.json();
                    temp = Math.round(data.current.temperature_2m);
                    ({ emoji } = getWeatherInfo(data.current.weathercode, data.current.is_day === 1));
                }

                if (geoResp && geoResp.ok) {
                    const geo = await geoResp.json();
                    const addr = geo.address || {};
                    const c = addr.city || addr.town || addr.village || addr.county || '';
                    const s = addr.state || '';
                    city = [c, s].filter(Boolean).join(', ');
                }

                if (temp !== null) {
                    applyWeatherData(emoji, temp, city);
                    try {
                        localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({ emoji, temp, city, ts: Date.now() }));
                    } catch (e) { /* storage full */ }
                }
            } catch (e) { /* silent on fetch error */ }
        }

        async function fetchWeatherByIP() {
            try {
                const resp = await fetch('https://ipapi.co/json/');
                if (!resp.ok) return;
                const data = await resp.json();
                if (!data.latitude || !data.longitude) return;
                const city = [data.city, data.region].filter(Boolean).join(', ');
                await fetchWeatherByCoords(data.latitude, data.longitude, city);
            } catch (e) { /* silent on fetch error */ }
        }

        async function initWeather() {
            // Use cache if still fresh
            try {
                const raw = localStorage.getItem(WEATHER_CACHE_KEY);
                if (raw) {
                    const cached = JSON.parse(raw);
                    if (Date.now() - cached.ts < WEATHER_CACHE_TTL) {
                        applyWeatherData(cached.emoji, cached.temp, cached.city);
                        return;
                    }
                }
            } catch (e) { /* ignore bad cache */ }

            if (!navigator.geolocation) {
                fetchWeatherByIP();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async function(pos) {
                    await fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude, null);
                },
                function() { fetchWeatherByIP(); }
            );
        }
        
        initWeather();
        
        function navigateToEntry(dateString) {
            window.location.href = '/entry/' + dateString;
        }
        
        // Session countdown timer - value calculated by backend
        const sessionTimeout = [[${sessionTimeout}]];
        const sessionTimerElement = document.getElementById('session-timer');
        const sessionTimerText = sessionTimerElement.querySelector('.session-timer-text');
        let remainingSeconds = sessionTimeout;
        console.log('Session timer initialized with', remainingSeconds, 'seconds remaining');
        
        function updateSessionTimer() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            sessionTimerText.textContent = timeString;
            
            // Visual warnings
            if (remainingSeconds <= 60) {
                sessionTimerElement.classList.add('critical');
                sessionTimerElement.classList.remove('warning');
            } else if (remainingSeconds <= 180) {
                sessionTimerElement.classList.add('warning');
                sessionTimerElement.classList.remove('critical');
            }
            
            remainingSeconds--;
            
            if (remainingSeconds < 0) {
                window.location.href = '/logout';
            }
        }
        
        // Update session timer every second
        updateSessionTimer();
        setInterval(updateSessionTimer, 1000);
        
        // Heatmap functionality
        let heatmapData = null;
        let currentPeriod = 365; // Default to 1 year
        
        function onWeekendToggle() {
            const checked = document.getElementById('hide-weekends-checkbox').checked;
            document.cookie = `hide_weekends=${checked ? '1' : '0'};path=/;max-age=${60 * 60 * 24 * 365}`;
            renderHeatmap(heatmapData);
        }

        (function restoreWeekendPref() {
            const match = document.cookie.split('; ').find(c => c.startsWith('hide_weekends='));
            if (match && match.split('=')[1] === '1') {
                const cb = document.getElementById('hide-weekends-checkbox');
                if (cb) cb.checked = true;
            }
        })();

        async function showHeatmap() {
            const modal = document.getElementById('heatmap-modal');
            modal.classList.add('active');
            
            if (!heatmapData) {
                await loadHeatmapData(currentPeriod);
            }
        }
        
        async function changePeriod(days) {
            currentPeriod = days;
            
            // Update active button
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Reload data with new period
            await loadHeatmapData(days);
        }
        
        function closeHeatmap() {
            const modal = document.getElementById('heatmap-modal');
            modal.classList.remove('active');
        }
        
        // Close on outside click
        document.getElementById('heatmap-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeHeatmap();
            }
        });
        
        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeHeatmap();
            }
        });
        
        async function loadHeatmapData(daysBack) {
            try {
                const response = await fetch(`/api/heatmap?daysBack=${daysBack}`);
                if (!response.ok) {
                    throw new Error('Failed to load heatmap data');
                }
                
                heatmapData = await response.json();
                renderHeatmap(heatmapData);
            } catch (error) {
                console.error('Error loading heatmap:', error);
                alert('Failed to load heatmap data. Please try again.');
            }
        }
        
        function renderHeatmap(data) {
            if (!data) return;
            const hideWeekends = document.getElementById('hide-weekends-checkbox').checked;
            const numDayRows = hideWeekends ? 5 : 7;
            
            // Render stats
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${data.stats.totalEntries}</div>
                    <div class="stat-label">Total Entries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.stats.currentStreak} 🔥</div>
                    <div class="stat-label">Current Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.stats.longestStreak}</div>
                    <div class="stat-label">Longest Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round(data.stats.averageWordCount)}</div>
                    <div class="stat-label">Avg Words/Entry</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.stats.mostProductiveDay}</div>
                    <div class="stat-label">Most Productive Day</div>
                </div>
            `;
            
            // Render heatmap grid (GitHub-style)
            const heatmapGrid = document.getElementById('heatmap-grid');
            heatmapGrid.innerHTML = '';
            
            // Group days by actual calendar week
            const weeks = [];
            const weekMap = new Map();
            
            // Helper function to parse date string as local date
            function parseLocalDate(dateStr) {
                const [year, month, day] = dateStr.split('-');
                return new Date(year, month - 1, day);
            }
            
            // Filter out weekends if checkbox is checked (dayOfWeek 0=Sun, 6=Sat)
            const visibleDays = hideWeekends
                ? data.days.filter(d => d.dayOfWeek !== 0 && d.dayOfWeek !== 6)
                : data.days;
            
            const firstDate = parseLocalDate(data.days[0].date);
            
            visibleDays.forEach(day => {
                const date = parseLocalDate(day.date);
                // Calculate week number from start date
                const daysDiff = Math.floor((date - firstDate) / (1000 * 60 * 60 * 24));
                const weekNum = Math.floor(daysDiff / 7);
                
                if (!weekMap.has(weekNum)) {
                    weekMap.set(weekNum, new Array(numDayRows).fill(null));
                }
                
                // For weekdays-only mode: Mon(1)->row0, Tue(2)->row1, ..., Fri(5)->row4
                const rowIndex = hideWeekends ? day.dayOfWeek - 1 : day.dayOfWeek;
                weekMap.get(weekNum)[rowIndex] = day;
            });
            
            // Convert map to array
            const maxWeek = Math.max(...weekMap.keys());
            for (let i = 0; i <= maxWeek; i++) {
                weeks.push(weekMap.get(i) || new Array(numDayRows).fill(null));
            }
            
            // Calculate dynamic cell size based on number of weeks
            const modalContent = document.querySelector('.modal-content');
            const availableWidth = modalContent ? modalContent.offsetWidth - 120 : 900; // Reserve space for labels and padding
            const minCellSize = 6;
            const maxCellSize = 20;
            const gap = 3;
            
            // Calculate cell size to fit all weeks without scrolling
            let cellSize = Math.floor((availableWidth - (weeks.length * gap)) / weeks.length);
            cellSize = Math.max(minCellSize, Math.min(maxCellSize, cellSize)); // Clamp between min and max
            
            // Create month labels
            const monthLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            // Render heatmap (rotate: weeks as columns, days as rows)
            heatmapGrid.style.display = 'grid';
            heatmapGrid.style.gridTemplateColumns = '32px ' + 'repeat(' + weeks.length + ', ' + cellSize + 'px)';
            heatmapGrid.style.gridTemplateRows = 'repeat(' + numDayRows + ', ' + cellSize + 'px)';
            heatmapGrid.style.gap = gap + 'px';
            
            // Day labels
            const dayLabels = hideWeekends
                ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']
                : ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            for (let dayNum = 0; dayNum < numDayRows; dayNum++) {
                const label = document.createElement('div');
                label.className = 'month-label';
                label.textContent = dayLabels[dayNum];
                label.style.gridColumn = '1';
                label.style.gridRow = (dayNum + 1);
                heatmapGrid.appendChild(label);
            }
            
            // Render each week as a column
            weeks.forEach((week, weekIndex) => {
                week.forEach((day, dayIndex) => {
                    const cell = document.createElement('div');
                    cell.className = 'heatmap-day';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    
                    if (day) {
                        cell.setAttribute('data-intensity', day.intensity);
                        cell.setAttribute('data-date', day.date);
                        cell.setAttribute('data-words', day.wordCount);
                        
                        // Apply special day type classes
                        if (day.dayType === 'PTO') {
                            cell.classList.add('pto-day');
                        } else if (day.dayType === 'Planning') {
                            cell.classList.add('planning-day');
                        } else if (day.dayType === 'Support') {
                            cell.classList.add('support-day');
                        }
                        
                        // Tooltip on hover
                        cell.addEventListener('mouseenter', function(e) {
                            showTooltip(e, day);
                        });
                        
                        cell.addEventListener('mouseleave', function() {
                            hideTooltip();
                        });
                        
                        // Click to navigate to entry
                        cell.addEventListener('click', function() {
                            window.location.href = '/entry/' + day.date;
                        });
                    } else {
                        cell.style.background = 'transparent';
                        cell.style.cursor = 'default';
                    }
                    
                    // dayIndex now correctly represents the day of week (0=Sun, 1=Mon, etc.)
                    cell.style.gridColumn = (weekIndex + 2);
                    cell.style.gridRow = (dayIndex + 1);
                    heatmapGrid.appendChild(cell);
                });
            });
        }
        
        function showTooltip(event, day) {
            const tooltip = document.getElementById('heatmap-tooltip');
            // Parse date as local date to avoid timezone issues
            const [year, month, dayNum] = day.date.split('-');
            const date = new Date(year, month - 1, dayNum);
            const dateStr = date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
            
            // Show day type for special days, otherwise show word count
            let content;
            if (day.dayType) {
                content = `<strong>${dateStr}</strong><br>${day.dayType}`;
            } else {
                content = `<strong>${dateStr}</strong><br>${day.wordCount} words`;
            }
            
            tooltip.innerHTML = content;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY + 10) + 'px';
        }
        
        function hideTooltip() {
            const tooltip = document.getElementById('heatmap-tooltip');
            tooltip.style.display = 'none';
        }
    </script>
</body>
</html>
