<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Standup App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        
        .logout-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .logout-btn {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s;
            display: inline-block;
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover {
            transform: translateY(-1px);
        }
        
        .month-year {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        
        .calendar {
            padding: 30px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: #dee2e6;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .day-header {
            background: #f8f9fa;
            padding: 15px 5px;
            text-align: center;
            font-weight: 600;
            color: #495057;
        }
        
        .day-cell {
            background: white;
            min-height: 80px;
            padding: 10px 5px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        
        .day-cell:hover {
            background: #f8f9fa;
        }
        
        .day-cell.other-month {
            background: #f8f9fa;
            color: #6c757d;
        }
        
        .day-cell.today {
            background: #e8f5e8;
        }
        
        .day-cell.today::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
        }
        
        .day-cell.has-entry::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #ff7f00;
            border-radius: 50%;
        }
        
        .day-cell.today.has-entry::after {
            background: #28a745;
        }
        
        .day-number {
            font-size: 16px;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .calendar-nav {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .day-cell {
                min-height: 60px;
                font-size: 14px;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <a href="/logout" class="logout-btn" id="logout-btn">🚪 Logout</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>📋 Standup App</h1>
            <p>Track your daily standups</p>
        </div>
        
        <div class="calendar-nav">
            <a th:href="@{/(month=${displayDate.minusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">← Previous</a>
            <div class="month-year" th:text="${displayDate.format(T(java.time.format.DateTimeFormatter).ofPattern('MMMM yyyy'))}"></div>
            <a th:href="@{/(month=${displayDate.plusMonths(1).format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM'))})}" class="nav-btn">Next →</a>
        </div>
        
        <div class="calendar">
            <div class="calendar-grid">
                <div class="day-header">Sun</div>
                <div class="day-header">Mon</div>
                <div class="day-header">Tue</div>
                <div class="day-header">Wed</div>
                <div class="day-header">Thu</div>
                <div class="day-header">Fri</div>
                <div class="day-header">Sat</div>
                
                <!-- Calendar days generated by CalendarService -->
                <div th:each="day : ${calendarDays}" 
                     th:class="${day.cssClasses}"
                     th:data-date="${day.dateString}"
                     onclick="navigateToEntry(this.dataset.date)">
                    <div class="day-number" th:text="${day.dayNumber}"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                if (!confirm('Are you sure you want to logout?')) {
                    e.preventDefault();
                    return false;
                }
            });
        }
        
        function navigateToEntry(dateString) {
            window.location.href = '/entry/' + dateString;
        }
    </script>
</body>
</html>
