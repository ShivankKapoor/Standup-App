spring.application.name=Standup-App

# Server Configuration
server.port=5555

# Cloudflare Tunnel Configuration (HTTP origin with HTTPS termination at CF)
# SSL is handled by Cloudflare, not the application
server.ssl.enabled=false

# Environment Variables for Authentication
auth.username=${AUTH_USERNAME:}
auth.password=${AUTH_PASSWORD:}
auth.secret.key=${FLASK_SECRET_KEY:}

# CSRF Configuration
csrf.time.limit=${WTF_CSRF_TIME_LIMIT:3600}

# File Storage Configuration
standups.file=${STANDUPS_FILE:data/Standups.txt}

# Discord Webhook
discord.webhook.url=${DISCORD_WEBHOOK_URL:}

# Logging Configuration
logging.level.com.shivank.Standup_App=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Cloudflare Tunnel / Proxy Configuration - Simplified for Docker
server.forward-headers-strategy=framework
server.use-forward-headers=true

# Trust proxy headers for proper IP resolution
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
server.tomcat.remoteip.internal-proxies=10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.2[0-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]{1}\\.\\d{1,3}\\.\\d{1,3}|0:0:0:0:0:0:0:1|::1

# Cookie security optimized for Cloudflare Tunnel + Docker
# Secure cookies handled by Cloudflare HTTPS termination
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Additional proxy settings for Cloudflare Tunnel
server.tomcat.redirect-context-root=false
server.tomcat.use-relative-redirects=true
