# Cloudflare Tunnel Configuration for Standup App (Docker + HTTP)
# Replace 'your-tunnel-id' and 'your-domain.com' with your actual values

tunnel: your-tunnel-id
credentials-file: /path/to/your/credentials.json

ingress:
  # Route your domain to the Docker container running HTTP
  - hostname: your-domain.com
    service: http://localhost:5555
    originRequest:
      # Disable TLS verification since we're connecting to HTTP container
      noTLSVerify: true
      # Explicitly set HTTP (not HTTPS) for Docker container
      httpHostHeader: localhost
      # Don't try to upgrade connection to HTTPS
      disableChunkedEncoding: false
      # Connection timeout settings for Docker
      connectTimeout: 30s
      tlsTimeout: 30s
  
  # Catch-all rule (required)
  - service: http_status:404

# Enable logging for debugging Docker + Tunnel issues
loglevel: info
